<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adánback - Crear Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFF8E1] flex items-center justify-center h-screen font-sans">
    
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-zinc-100">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-[#FFB300] tracking-tight">Adán</h1>
            <p class="text-[#CDDC39] mt-2 font-medium text-sm uppercase tracking-wider">Crea una cuenta</p>
        </div>
                <div class="bg-[#FFE082] text-[#FF6F00] p-3 rounded-lg mb-4 text-sm font-medium text-center border border-[#FF6F00]">
                    {{ message }}
                </div>
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-[#CDDC39] mb-1">Elige tu nombre de usuario</label>
                <input type="text" name="username" required class="w-full border-b-2 border-[#CDDC39] focus:border-[#CDDC39] outline-none py-2 transition-all font-medium">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-[#CDDC39] mb-1">Crea tu contraseña</label>
                <input type="password" name="password" required class="w-full border-b-2 border-[#CDDC39] focus:border-[#CDDC39] outline-none py-2 transition-all font-medium">
            </div>
            
            <button type="submit" class="w-full bg-[#FFB300] text-[#CDDC39] py-3 rounded-full font-semibold hover:bg-[#EF6C00] transition-all shadow-md">
                Registrar mi cuenta Adán
            </button>
        </form>
    </div>
</body>
</html>
